name: release

# Build a packaged tarball every time a version tag is pushed (e.g. v0.1.0).
# Attaches the tarball to the GitHub Release for direct download + app-store upload.

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Build package
        run: make package

      - name: Locate artifact
        id: artifact
        run: |
          set -e
          file=$(ls build/release/talk_transcripts-*.tar.gz | head -1)
          echo "path=$file" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $file)" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
